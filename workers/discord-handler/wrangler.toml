# Cloudflare Worker — Discord interaction handler
#
# 本番デプロイは `pnpm deploy` (要 Cloudflare アカウント + wrangler login)。
# ローカル開発は `pnpm dev` で http://localhost:8787 を listen。

name = "discord-handler"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# 本番ログを Cloudflare dashboard で見るために有効化 (Workers Logs)。
[observability]
enabled = true

[vars]
AWS_REGION = "ap-northeast-1"
CLOUDFLARE_ZONE_ID = "<YOUR_CLOUDFLARE_ZONE_ID>"
CLOUDFLARE_BASE_DOMAIN = "example.com"
EC2_SUBNET_ID = "<YOUR_SUBNET_ID>"
EC2_SECURITY_GROUP_ID = "sg-00cb1cc5269f27870"
EC2_KEY_NAME = "gs-phase0-key"
EC2_IMAGE_ID = "resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
EC2_INSTANCE_PROFILE_NAME = "gs-phase0-ec2-role"
ATM11_SNAPSHOT_ID = "<YOUR_SEED_SNAPSHOT_ID>"
ATM11_CF_RECORD_ID = "<YOUR_CF_RECORD_ID>"
ATM11_RCON_PASSWORD_SSM_PATH = "/gs/atm11/rcon_password"
LAUNCHER_TARBALL_S3_URI = "s3://gs-game-configs/launcher/atm11.tar.gz"
SNS_ALLOWED_TOPIC_ARN = "arn:aws:sns:ap-northeast-1:123456789012:gs-alerts"

# ---- 今は使わない (Phase 1 後半で実体作成して uncomment) ----
#
# [[kv_namespaces]]
# binding = "GAME_REGISTRY"
# id = "TBD"           # `wrangler kv namespace create GAME_REGISTRY` で発行された ID
#
# [[kv_namespaces]]
# binding = "SERVER_STATE"
# id = "TBD"
#
# [triggers]
# crons = ["0 * * * *"]  # 1時間ごとに idle フォールバック (Phase 3)
#
# シークレットは wrangler secret put NAME で投入する (このファイルには書かない):
#   - DISCORD_PUBLIC_KEY      ed25519 verification
#   - DISCORD_BOT_TOKEN       (interaction follow-up message 用)
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - CLOUDFLARE_DNS_API_TOKEN
#   - SIDECAR_HMAC_SECRET
