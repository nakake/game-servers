# Cloudflare Worker — Discord interaction handler
#
# 本番デプロイは `pnpm deploy` (要 Cloudflare アカウント + wrangler login)。
# ローカル開発は `pnpm dev` で http://localhost:8787 を listen。

name = "discord-handler"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# 本番ログを Cloudflare dashboard で見るために有効化 (Workers Logs)。
[observability]
enabled = true

[vars]
AWS_REGION = "ap-northeast-1"
CLOUDFLARE_ZONE_ID = "<YOUR_CLOUDFLARE_ZONE_ID>"
CLOUDFLARE_BASE_DOMAIN = "example.com"
# EC2 起動先。AMI / Key / SG / IAM profile / Spot / EBS base / 静的タグは
# Launch Template (gs-game-server) 側。値は `infra/tf.ps1 output launch_template_id`。
EC2_LAUNCH_TEMPLATE_ID = "<YOUR_LAUNCH_TEMPLATE_ID>"
EC2_SUBNET_ID = "<YOUR_SUBNET_ID>"
SNS_ALLOWED_TOPIC_ARN = "arn:aws:sns:ap-northeast-1:123456789012:gs-alerts"
# Phase 3: Worker 自身の公開 URL。user-data に焼き込み sidecar の WORKER_URL env になる。
# 初回 deploy 後に wrangler の出力 (https://discord-handler.<account>.workers.dev) を貼る。
WORKER_PUBLIC_URL = "https://discord-handler.<your-account>.workers.dev"
# ゲーム固有の値 (snapshot seed / cf_record_id / RCON SSM パス / launcher tarball) は
# Phase 2 で registry.json (GAME_REGISTRY KV) に移管。ここには持たない。

# ---- SERVER_STATE KV ----
# 2 用途で使う:
#   - pending-ready   : /start 〜 ready 通知の間、interaction の文脈 (token / userId) を保持
#   - pending-cleanup : /stop が予約した「snapshot 完成後に削除する volume」を保持 (Cron が回収)
# 別環境に作り直すときは `wrangler kv namespace create SERVER_STATE` で発行した id に差し替える。
[[kv_namespaces]]
binding = "SERVER_STATE"
id = "<YOUR_KV_SERVER_STATE_ID>"

# ---- GAME_REGISTRY KV ----
# ゲーム定義 (games/<id>/registry.json) の source of truth。key=<game_id> / value=JSON。
# scripts/register-game.mjs が投入し、Worker は lib/registry/store.ts 経由で読む (Phase 2)。
# 別環境に作り直すときは `wrangler kv namespace create GAME_REGISTRY` で発行した id に差し替える。
[[kv_namespaces]]
binding = "GAME_REGISTRY"
id = "<YOUR_KV_GAME_REGISTRY_ID>"

# Cron Trigger — 5 分ごとに 2 つの後追い処理を回す:
#   - handlers/cleanup.ts           : `/stop` が予約した「snapshot 完成後に削除する volume」を回収。
#     snapshot 完成は数分かかり Worker の 1 invocation では待ち切れないため、stop.ts は KV に
#     予約を書くだけにし、この cron が完成を確認して volume を削除する。
#   - handlers/snapshot-retention.ts: game-world snapshot を registry の generations 世代に絞る
#     (DLM 不採用、docs/iac-migration-plan.md Step 6)。
[triggers]
crons = ["*/5 * * * *"]
#
# idle 検知フォールバック (Phase 3) を足すときは上の crons 配列にエントリを追加する:
#   crons = ["*/5 * * * *", "0 * * * *"]
#
# シークレットは wrangler secret put NAME で投入する (このファイルには書かない):
#   - DISCORD_PUBLIC_KEY      ed25519 verification
#   - DISCORD_BOT_TOKEN       (interaction follow-up message 用)
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - CLOUDFLARE_DNS_API_TOKEN
#   - SIDECAR_HMAC_SECRETS    Phase 3: sidecar 認証用 game→secret の JSON map
#                             例: {"atm11":"<base64 secret>"}
#                             sidecar 側は SSM /gs/<game>/sidecar_hmac_secret を読む
