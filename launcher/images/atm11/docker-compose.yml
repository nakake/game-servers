# ローカル検証用 (Phase 1)
#
# 用途: Windows + Docker Desktop で ATM11 を Docker 上で起動し、
#       SIGTERM trap → rcon save-all → stop の流れを確認する。
#
# 使い方:
#   1. F:/Games/minecraft/ATM/ATM11 に Phase 0 で使った ATM11 一式があること
#   2. .env を作成 (rcon パスワードなど) — env.example を参照
#   3. docker compose up --build
#   4. Minecraft クライアントから localhost:25565 で接続
#   5. (別ターミナル) docker stop --time=60 atm11
#      → entrypoint の trap → rcon save-all flush → stop → java exit
#
# 本番 (EC2) では Compose ではなく cloud-init から `docker run` 経由で起動する。

services:
  atm11:
    build: .
    image: ghcr.io/game-servers/atm11-server:26.1.2-dev
    container_name: atm11
    stop_grace_period: 60s
    stop_signal: SIGTERM
    ports:
      - "25565:25565/tcp"
      # RCON port (25575) は意図的に公開しない (localhost のみ)
    volumes:
      # ATM11_DATA_DIR を .env で上書き。Windows ローカル / EC2 で値を切り替える。
      #   - Windows Docker Desktop: F:/Games/minecraft/ATM/ATM11 (デフォルト)
      #   - EC2 (Amazon Linux 2023): /opt/atm11 など EBS マウント先
      - "${ATM11_DATA_DIR:-F:/Games/minecraft/ATM/ATM11}:/data"
    environment:
      NEOFORGE_VERSION: "26.1.2.48-beta"
      RCON_PORT: "25575"
      # RCON_PASSWORD は .env で渡す (Git にコミットしない)
      RCON_PASSWORD: "${RCON_PASSWORD:?set RCON_PASSWORD in .env}"
      EULA: "TRUE"
    restart: "no"

  # Phase 3 で導入された sidecar (idle 検知 + Worker への heartbeat)。
  # ローカル検証では IAM 認証情報が無いため SSM 呼び出しが失敗して exit する。
  # 「コンテナがビルド・起動できて、env の組立てが Worker と整合しているか」を見るだけの用途。
  # 本番動作は EC2 上 (cloud-init の docker run) で確認する。
  sidecar:
    build:
      context: ../../sidecar
    image: gs-sidecar:dev
    container_name: sidecar
    # atm11 のネットワーク名前空間に相乗りすることで localhost:25575 RCON にアクセスする。
    # 本番 (EC2) は `--network host` で同等のことを実現する (user-data.ts 参照)。
    network_mode: "service:atm11"
    depends_on:
      - atm11
    stop_grace_period: 10s
    environment:
      GAME_ID: "atm11"
      # 別シェルで `cd workers/discord-handler && pnpm dev` を起動した wrangler dev を想定。
      # Docker Desktop は host.docker.internal でホストの localhost に届く (Linux は要設定)。
      WORKER_URL: "${WORKER_URL:-http://host.docker.internal:8787}"
      AWS_REGION: "ap-northeast-1"
      # ローカル AWS profile を sidecar に渡したい場合は AWS_PROFILE / aws-sdk credential を
      # マウントする必要がある。Step 6 のスコープ外 (本番動作は EC2 instance role を使う)。
    restart: "on-failure:3"
